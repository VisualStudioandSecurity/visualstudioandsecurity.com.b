<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pedro Raccoon - VS Games</title>
    <style>
        :root { --blue: #58a6ff; --bg: #0d1117; --card: #161b22; }
        
        body { 
            background: var(--bg); color: var(--blue); text-align: center; 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }

        h1 { font-size: 1.2rem; margin: 10px 0; letter-spacing: 2px; }

        canvas { 
            background: var(--card); border: 3px solid var(--blue); 
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2); 
            max-width: 95vw; max-height: 75vh; touch-action: none; cursor: pointer;
        }

        .ui { margin-top: 10px; font-weight: bold; font-size: 0.9rem; color: #8b949e; }
    </style>
</head>
<body>
    <h1>PEDRO RACCOON: DASH</h1>
    <canvas id="game" width="400" height="500"></canvas>
    <div class="ui">Toque na tela para pular!</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let score = 0, raccoonY = 250, velocity = 0, gravity = 0.4;
        let pipeX = 400, pipeGap = 160, pipeTopHeight = 150;
        let isGameOver = false;

        function draw() {
            ctx.clearRect(0,0,400,500);

            // Raccoon (Círculo Neon com Emoji)
            ctx.fillStyle = '#58a6ff';
            ctx.shadowBlur = 15; ctx.shadowColor = '#58a6ff';
            ctx.beginPath(); ctx.arc(60, raccoonY, 18, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.font = "20px Arial";
            ctx.fillText("🦝", 48, raccoonY + 7);

            // Gravidade e Movimento
            velocity += gravity;
            raccoonY += velocity;

            // Obstáculos (Canos)
            ctx.fillStyle = '#238636';
            ctx.fillRect(pipeX, 0, 50, pipeTopHeight);
            ctx.fillRect(pipeX, pipeTopHeight + pipeGap, 50, 500);
            
            pipeX -= 3.5; // Velocidade do jogo

            // Reset do Cano e Score
            if(pipeX < -50) { 
                pipeX = 400; 
                pipeTopHeight = Math.random() * (500 - pipeGap - 100) + 50; 
                score++; 
            }

            // Colisões e Limites
            const hitPipe = (pipeX < 80 && pipeX > 10 && (raccoonY - 15 < pipeTopHeight || raccoonY + 15 > pipeTopHeight
