<!doctype html>
<html lang="pt-BR" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valoranto | Visual Studio Games</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&amp;family=Orbitron:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
        @keyframes flipIn { 0% { transform: rotateX(90deg); opacity: 0; } 100% { transform: rotateX(0deg); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.12); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 8px rgba(255,70,85,0.4); } 50% { box-shadow: 0 0 20px rgba(255,70,85,0.8); } }

        body {
            background: linear-gradient(135deg, #0f1923 0%, #1a0a0a 50%, #0f1923 100%);
            font-family: 'Rajdhani', sans-serif;
            color: white;
        }
        .cell {
            width: 50px; height: 50px;
            border: 2px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', monospace;
            font-weight: 700; font-size: 1.2rem;
            text-transform: uppercase;
            transition: border-color 0.2s, background 0.3s;
        }
        .cell.active { border-color: #ff4655; box-shadow: 0 0 10px rgba(255, 70, 85, 0.3); }
        .cell.correct { background: #538d4e; border-color: #538d4e; }
        .cell.present { background: #b59f3b; border-color: #b59f3b; }
        .cell.absent { background: #3a3a3c; border-color: #3a3a3c; }
        .cell.filled { border-color: #888; }

        .key {
            height: 45px; min-width: 30px; padding: 0 6px;
            border-radius: 6px; background: #444;
            font-weight: bold; cursor: pointer; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, transform 0.1s;
            user-select: none;
            font-family: 'Orbitron', monospace;
        }
        .key:hover { background: #666; transform: scale(1.05); }
        .key:active { transform: scale(0.95); }
        .key.wide { min-width: 55px; font-size: 0.7rem; }
        .key.correct { background: #538d4e; }
        .key.present { background: #b59f3b; }
        .key.absent { background: #2a2a2c; color: #666; }

        .flip-in { animation: flipIn 0.4s ease forwards; }
        .shake { animation: shake 0.5s ease; }
        .pop-in { animation: popIn 0.3s ease forwards; }

        .toast {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: #1a1a2e; border: 1px solid #ff4655; padding: 8px 20px;
            border-radius: 8px; font-weight: 600; font-size: 0.85rem; z-index: 100;
            animation: slideUp 0.3s ease;
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full flex flex-col items-center overflow-auto">
  <header class="w-full max-w-lg flex items-center justify-between p-4 mb-2 border-b border-red-500/30">
   <div class="w-8"></div>
   <h1 id="game-title" class="text-2xl font-black italic tracking-tighter text-[#ff4655]" style="font-family:'Orbitron',monospace">VALORANTO</h1>
   <div id="stats" class="text-[10px] text-gray-500 text-right leading-relaxed"><span class="text-green-400">V</span>: <span id="win-count" class="text-white">0</span> | <span class="text-red-400">D</span>: <span id="loss-count" class="text-white">0</span> | 🔥 <span id="streak-count" class="text-yellow-400">0</span>
   </div>
  </header>
  <div class="mb-3 flex items-center gap-3"><button onclick="showHint()" id="hint-btn" class="px-4 py-1.5 bg-indigo-600/80 rounded-lg text-xs font-bold hover:bg-indigo-500 transition flex items-center gap-1.5"> <span>💡</span> DICA </button>
   <div id="attempt-indicator" class="text-[10px] text-gray-600 tracking-wider"></div>
  </div>
  <p id="hint-text" class="hidden text-indigo-400 text-[11px] mb-2 text-center max-w-[260px] italic px-4"></p>
  <main id="grid" class="flex flex-col gap-1.5 mb-4"></main>
  <div id="keyboard" class="w-full max-w-md px-2 flex flex-col gap-1.5 mt-auto pb-6"></div><!-- Result Modal -->
  <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50" style="backdrop-filter:blur(4px)">
   <div class="bg-[#1a1a2e] border-2 border-[#ff4655] p-8 rounded-xl text-center max-w-xs w-full" style="animation:popIn 0.4s ease">
    <div id="modal-emoji" class="text-5xl mb-3"></div>
    <h2 id="modal-title" class="text-2xl font-bold mb-1" style="font-family:'Orbitron',monospace;color:#ff4655"></h2>
    <p id="modal-subtitle" class="text-gray-500 text-xs mb-3"></p>
    <p id="modal-word" class="text-gray-300 mb-1 uppercase tracking-widest text-lg font-bold" style="font-family:'Orbitron',monospace"></p>
    <p id="modal-desc" class="text-gray-500 text-[11px] mb-6 italic"></p><button onclick="newGame()" class="w-full py-3 bg-[#ff4655] font-bold rounded-lg hover:brightness-110 transition text-sm tracking-wider" style="font-family:'Orbitron',monospace"> JOGAR NOVAMENTE </button>
   </div>
  </div>
  <script>
        const WORDS = [
            { w: 'JETT', d: 'Duelista coreana, mestre das facas.' },
            { w: 'RAZE', d: 'Duelista brasileira, adora explosivos.' },
            { w: 'SAGE', d: 'Sentinela chinesa, cura e ressuscita.' },
            { w: 'SOVA', d: 'Iniciador russo, olho de drone.' },
            { w: 'OMEN', d: 'Controlador sombrio, teleporte fantasma.' },
            { w: 'NEON', d: 'Duelista filipina, velocidade elétrica.' },
            { w: 'FADE', d: 'Iniciadora turca, caça pelo medo.' },
            { w: 'KAYO', d: 'Iniciador robô, suprime habilidades.' },
            { w: 'YORU', d: 'Duelista japonês, mestre da ilusão.' },
            { w: 'BIND', d: 'Mapa com teleporters, sem meio.' },
            { w: 'HAVEN',d: 'Mapa com três bomb sites.' },
            { w: 'SPLIT',d: 'Mapa vertical com cordas e rampas.' },
            { w: 'PEARL',d: 'Mapa subaquático em Portugal.' },
            { w: 'LOTUS',d: 'Mapa com portas giratórias na Índia.' },
            { w: 'ASCENT',d:'Mapa italiano com portas destrutíveis.' },
            { w: 'BREACH',d:'Iniciador sueco, poderes sísmicos.' },
            { w: 'BRIM', d: 'Controlador americano, fumaceiro orbital.' },
            { w: 'VIPER',d: 'Controladora americana, gás tóxico.' },
            { w: 'REYNA',d: 'Duelista mexicana, vampira das almas.' },
            { w: 'ASTRA',d: 'Controladora ganesa, poderes cósmicos.' },
            { w: 'GEKKO',d: 'Iniciador com criaturas vivas.' },
            { w: 'CYPHER',d:'Sentinela marroquino, mestre espião.' },
            { w: 'SKYE', d: 'Iniciadora australiana, fauna curativa.' },
            { w: 'CLOVE',d: 'Controladora imortal escocesa.' },
            { w: 'ISO',  d: 'Duelista chinês, escudo dimensional.' },
            { w: 'KILLJOY',d:'Sentinela alemã, engenheira de torretas.' },
            { w: 'HARBOR',d:'Controlador indiano, poderes aquáticos.' },
            { w: 'DEADLOCK',d:'Sentinela norueguesa, armadilhas mortais.' },
            { w: 'ICEBOX',d:'Mapa gelado com tirolesa.' },
            { w: 'FRACTURE',d:'Mapa com dois spawns conectados.' },
            { w: 'SPIKE',d: 'Bomba que os atacantes plantam.' },
            { w: 'FLASH',d: 'Habilidade que cega inimigos.' },
            { w: 'PLANT',d: 'Ato de colocar a spike no site.' },
            { w: 'CLUTCH',d:'Vencer a rodada sozinho.' },
            { w: 'KNIFE',d: 'Arma corpo a corpo clássica.' },
            { w: 'GHOST',d: 'Pistola silenciosa e precisa.' },
            { w: 'JUDGE',d: 'Escopeta automática devastadora.' },
            { w: 'ODIN', d: 'Metralhadora pesada de alto calibre.' },
            { w: 'ARES', d: 'Metralhadora leve e acessível.' },
            { w: 'RUSH', d: 'Estratégia de ataque rápido.' },
        ];

        let wordObj, word, wordLen, maxAttempts, currentRow, currentCol, gameOver;
        let wins = 0, losses = 0, streak = 0;
        let hintUsed = false;
        let keyStates = {};

        function pickWord() {
            wordObj = WORDS[Math.floor(Math.random() * WORDS.length)];
            word = wordObj.w;
            wordLen = word.length;
            maxAttempts = wordLen + 1;
        }

        function buildGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let r = 0; r < maxAttempts; r++) {
                const row = document.createElement('div');
                row.className = 'flex gap-1.5';
                row.id = 'row-' + r;
                for (let c = 0; c < wordLen; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `c-${r}-${c}`;
                    row.appendChild(cell);
                }
                grid.appendChild(row);
            }
            updateActiveRow();
        }

        function buildKeyboard() {
            const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            rows.forEach((r, i) => {
                const row = document.createElement('div');
                row.className = 'flex gap-1 justify-center';
                if (i === 2) {
                    const enter = document.createElement('button');
                    enter.className = 'key wide bg-[#ff4655]';
                    enter.textContent = 'ENTER';
                    enter.onclick = () => submitGuess();
                    row.appendChild(enter);
                }
                for (const ch of r) {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    btn.textContent = ch;
                    btn.id = 'key-' + ch;
                    btn.onclick = () => typeLetter(ch);
                    row.appendChild(btn);
                }
                if (i === 2) {
                    const del = document.createElement('button');
                    del.className = 'key wide';
                    del.innerHTML = '⌫';
                    del.onclick = () => deleteLetter();
                    row.appendChild(del);
                }
                kb.appendChild(row);
            });
        }

        function updateActiveRow() {
            for (let r = 0; r < maxAttempts; r++) {
                for (let c = 0; c < wordLen; c++) {
                    const cell = document.getElementById(`c-${r}-${c}`);
                    cell.classList.toggle('active', r === currentRow && !gameOver);
                }
            }
            document.getElementById('attempt-indicator').textContent = `${currentRow + 1} / ${maxAttempts}`;
        }

        function typeLetter(ch) {
            if (gameOver || currentCol >= wordLen) return;
            const cell = document.getElementById(`c-${currentRow}-${currentCol}`);
            cell.textContent = ch;
            cell.classList.add('filled');
            cell.style.animation = 'popIn 0.15s ease';
            currentCol++;
        }

        function deleteLetter() {
            if (gameOver || currentCol <= 0) return;
            currentCol--;
            const cell = document.getElementById(`c-${currentRow}-${currentCol}`);
            cell.textContent = '';
            cell.classList.remove('filled');
            cell.style.animation = '';
        }

        function submitGuess() {
            if (gameOver || currentCol < wordLen) {
                if (currentCol < wordLen) {
                    document.getElementById('row-' + currentRow).classList.add('shake');
                    setTimeout(() => document.getElementById('row-' + currentRow).classList.remove('shake'), 500);
                    showToast('Complete a palavra!');
                }
                return;
            }

            let guess = '';
            for (let c = 0; c < wordLen; c++) {
                guess += document.getElementById(`c-${currentRow}-${c}`).textContent;
            }

            // Evaluate
            const result = evaluateGuess(guess, word);

            // Animate cells
            result.forEach((r, i) => {
                setTimeout(() => {
                    const cell = document.getElementById(`c-${currentRow}-${i}`);
                    cell.classList.add('flip-in', r.state);

                    // Update keyboard
                    const key = document.getElementById('key-' + r.letter);
                    if (key) {
                        const priority = { correct: 3, present: 2, absent: 1 };
                        const current = keyStates[r.letter] || '';
                        if ((priority[r.state] || 0) > (priority[current] || 0)) {
                            key.className = 'key ' + r.state;
                            keyStates[r.letter] = r.state;
                        }
                    }
                }, i * 150);
            });

            setTimeout(() => {
                if (guess === word) {
                    gameOver = true;
                    wins++; streak++;
                    updateStats();
                    showModal(true);
                } else if (currentRow >= maxAttempts - 1) {
                    gameOver = true;
                    losses++; streak = 0;
                    updateStats();
                    showModal(false);
                } else {
                    currentRow++;
                    currentCol = 0;
                    updateActiveRow();
                }
            }, wordLen * 150 + 300);
        }

        function evaluateGuess(guess, answer) {
            const result = [];
            const ansArr = answer.split('');
            const guessArr = guess.split('');
            const used = new Array(ansArr.length).fill(false);

            // Correct first
            guessArr.forEach((ch, i) => {
                if (ch === ansArr[i]) {
                    result[i] = { letter: ch, state: 'correct' };
                    used[i] = true;
                }
            });

            // Present / Absent
            guessArr.forEach((ch, i) => {
                if (result[i]) return;
                const idx = ansArr.findIndex((a, j) => a === ch && !used[j]);
                if (idx >= 0) {
                    result[i] = { letter: ch, state: 'present' };
                    used[idx] = true;
                } else {
                    result[i] = { letter: ch, state: 'absent' };
                }
            });

            return result;
        }

        function showHint() {
            if (hintUsed) return;
            hintUsed = true;
            const el = document.getElementById('hint-text');
            el.textContent = wordObj.d;
            el.classList.remove('hidden');
            document.getElementById('hint-btn').classList.add('opacity-50');
            document.getElementById('hint-btn').style.pointerEvents = 'none';
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1800);
        }

        function showModal(won) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-emoji').textContent = won ? '🏆' : '💀';
            document.getElementById('modal-title').textContent = won ? 'VITÓRIA!' : 'DERROTA';
            document.getElementById('modal-subtitle').textContent = won
                ? `Acertou em ${currentRow + 1}/${maxAttempts} tentativa${currentRow > 0 ? 's' : ''}`
                : 'A palavra era:';
            document.getElementById('modal-word').textContent = word;
            document.getElementById('modal-desc').textContent = wordObj.d;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function updateStats() {
            document.getElementById('win-count').textContent = wins;
            document.getElementById('loss-count').textContent = losses;
            document.getElementById('streak-count').textContent = streak;
        }

        function newGame() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('hint-text').classList.add('hidden');
            document.getElementById('hint-btn').classList.remove('opacity-50');
            document.getElementById('hint-btn').style.pointerEvents = '';
            hintUsed = false;
            gameOver = false;
            currentRow = 0;
            currentCol = 0;
            keyStates = {};
            pickWord();
            buildGrid();
            buildKeyboard();
        }

        // Keyboard input
        document.addEventListener('keydown', e => {
            if (gameOver) return;
            if (e.key === 'Enter') submitGuess();
            else if (e.key === 'Backspace') deleteLetter();
            else if (/^[a-zA-Z]$/.test(e.key)) typeLetter(e.key.toUpperCase());
        });

        // Init
        const defaultConfig = {
            game_title: 'VALORANTO',
            background_color: '#0f1923',
            surface_color: '#1a1a2e',
            text_color: '#ffffff',
            primary_action_color: '#ff4655',
            secondary_action_color: '#4f46e5',
            font_family: 'Orbitron',
            font_size: 16
        };

        window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (config) => {
                const bg = config.background_color || defaultConfig.background_color;
                const surface = config.surface_color || defaultConfig.surface_color;
                const text = config.text_color || defaultConfig.text_color;
                const primary = config.primary_action_color || defaultConfig.primary_action_color;
                const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
                const font = config.font_family || defaultConfig.font_family;
                const size = config.font_size || defaultConfig.font_size;

                document.body.style.background = `linear-gradient(135deg, ${bg} 0%, #1a0a0a 50%, ${bg} 100%)`;

                const title = document.getElementById('game-title');
                title.textContent = config.game_title || defaultConfig.game_title;
                title.style.color = primary;
                title.style.fontFamily = `${font}, Orbitron, monospace`;
                title.style.fontSize = `${size * 1.5}px`;

                // Modal colors
                const modalBox = document.querySelector('#modal > div');
                if (modalBox) {
                    modalBox.style.background = surface;
                    modalBox.style.borderColor = primary;
                }
                const modalTitle = document.getElementById('modal-title');
                if (modalTitle) modalTitle.style.color = primary;

                // Hint button
                const hintBtn = document.getElementById('hint-btn');
                if (hintBtn) hintBtn.style.background = secondary;

                // Update key.wide buttons
                document.querySelectorAll('.key.wide').forEach(k => {
                    if (k.textContent === 'ENTER') k.style.background = primary;
                });

                // Header border
                const header = document.querySelector('header');
                if (header) header.style.borderColor = primary + '4d';
            },
            mapToCapabilities: (config) => ({
                recolorables: [
                    { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
                    { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
                    { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
                    { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: v => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
                    { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: v => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } },
                ],
                borderables: [],
                fontEditable: {
                    get: () => config.font_family || defaultConfig.font_family,
                    set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
                },
                fontSizeable: {
                    get: () => config.font_size || defaultConfig.font_size,
                    set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
                }
            }),
            mapToEditPanelValues: (config) => new Map([
                ['game_title', config.game_title || defaultConfig.game_title]
            ])
        });

        newGame();
        lucide.createIcons();
    </script>
