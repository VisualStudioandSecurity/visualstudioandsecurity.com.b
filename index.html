    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff; 
            --green: #238636; --gray: #8b949e; --neon: #00f2ff;
        }

        /* Centralização Global */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0; padding: 50px 0;
            display: flex; flex-direction: column; align-items: center;
            text-align: center;
            min-height: 100vh;
        }

        .container { width: 90%; max-width: 900px; }

        /* Letreiro Neon Pulsante */
        h1 {
            font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px;
            animation: neonPulse 1.5s ease-in-out infinite alternate;
            margin-bottom: 10px;
        }

        @keyframes neonPulse {
            from { text-shadow: 0 0 10px #fff, 0 0 20px var(--neon), 0 0 30px var(--neon); color: #fff; }
            to { text-shadow: 0 0 5px #fff, 0 0 15px var(--accent), 0 0 25px var(--accent); color: var(--neon); }
        }

        /* Galeria e Cards Corrigidos */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; margin-top: 40px;
            width: 100%;
        }

        .game-link {
            text-decoration: none; color: inherit; display: block; transition: 0.3s;
        }

        .game-card {
            background: var(--card); border-radius: 12px;
            border: 1px solid #30363d; overflow: hidden;
            display: flex; flex-direction: column; height: 100%;
        }

        .game-link:hover .game-card {
            transform: translateY(-8px);
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .game-card img {
            width: 100%; height: 180px; object-fit: cover;
            border-bottom: 1px solid #30363d; background: #000;
        }

        .card-content { padding: 15px; }
        .card-content h3 { margin: 10px 0; color: var(--neon); font-size: 1.2rem; }
        .card-content p { color: var(--gray); font-size: 0.9rem; margin: 0; }

        /* Botões */
        .btn-group { margin: 40px 0; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn {
            padding: 12px 24px; border-radius: 6px; font-weight: bold;
            text-decoration: none; color: white; cursor: pointer; border: none; transition: 0.3s;
        }
        .btn-github { background: var(--green); }
        .btn-pix { background: #32bcad; color: #0d1117; }

        /* Rodapé Centralizado */
        footer {
            margin-top: auto; width: 100%; padding: 40px 0;
            border-top: 1px solid #30363d; background: #090c10;
            display: flex; flex-direction: column; align-items: center;
        }

        .system-log {
            border: 1px solid var(--neon); padding: 10px 20px;
            font-family: monospace; border-radius: 5px; color: var(--neon);
            margin-bottom: 15px;
        }
    </style>
</head>
