    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --accent: #58a6ff; 
            --green: #238636; 
            --gray: #8b949e; 
            --neon: #00f2ff;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: white; 
            text-align: center; 
            padding: 20px; 
            margin: 0; 
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: auto; }

        /* Título Neon Pulse */
        h1 { 
            color: white; 
            font-size: 3rem; 
            margin-top: 40px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: neonPulse 1.5s infinite alternate;
        }

        @keyframes neonPulse {
            from { text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent); }
            to { text-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent), 0 0 40px var(--neon); }
        }

        .subtitle { color: var(--gray); margin-bottom: 40px; font-size: 1.1rem; font-weight: 300; }
        
        /* Grid de Jogos */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
            padding: 20px; 
        }
